# -----------------------------------------------
# docker-compose.yml Template
# -----------------------------------------------
# Defines your local container environment.
# Replaces long docker run commands with one file.
# Run with: docker compose up
# Stop with: docker compose down
# -----------------------------------------------

services:
  app:                                         # FILL IN: your service name
    build: .                                   # Build from Dockerfile in current directory
    container_name: app-local                  # FILL IN: name for local container
    ports:
      - "8080:8080"                            # FILL IN: host:container port mapping
    environment:
      - ENV=local                              # FILL IN: environment variables your app needs
    restart: unless-stopped                    # Restart on crash, stop manually to keep stopped

  # -----------------------------------------------
